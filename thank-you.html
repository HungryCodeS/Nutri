<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>You're on the list! — Nutrí</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FDFAF7; color: #2C2C2A; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .icon { font-size: 56px; margin-bottom: 24px; }
    .title { font-family: 'DM Serif Display', serif; font-size: 36px; color: #2C2C2A; margin-bottom: 12px; }
    .title em { color: #D85A30; font-style: italic; }
    .sub { font-size: 16px; color: #5F5E5A; line-height: 1.7; max-width: 420px; margin-bottom: 32px; }
    .back-btn { background: #D85A30; color: #fff; border: none; border-radius: 12px; padding: 14px 28px; font-size: 15px; font-weight: 600; font-family: 'Plus Jakarta Sans', sans-serif; cursor: pointer; text-decoration: none; display: inline-block; transition: background 0.2s; }
    .back-btn:hover { background: #993C1D; }
    .pill { display: inline-flex; align-items: center; gap: 6px; background: #FAF0EB; border: 0.5px solid #F0997B; border-radius: 20px; padding: 6px 14px; font-size: 12px; color: #993C1D; font-weight: 600; margin-bottom: 24px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #D85A30; }
  </style>
</head>
<body>
  <div class="icon">🌿</div>
  <div class="pill"><div class="dot"></div> You're on the list!</div>
  <div class="title">Welcome to <em>Nutrí.</em></div>
  <p class="sub">Thank you for joining! We'll be in touch as soon as the app is ready. Get ready to understand your body like never before.</p>
  <a class="back-btn" href="/">Back to Nutrí</a>
</body>
</html>
